<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ToolPrime</title><meta name="robots" content="noindex">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#f5f5f7;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .box{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);width:360px;text-align:center}
        .box h1{font-size:1.5rem;margin-bottom:4px}.box p{color:#6e6e73;font-size:0.85rem;margin-bottom:20px}
        input{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:10px;font-size:0.95rem;font-family:inherit;margin-bottom:12px;text-align:center}
        input:focus{border-color:#0071e3;outline:none}
        button{width:100%;padding:12px;background:#0071e3;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
        .err{color:#ff3b30;font-size:0.8rem;margin-bottom:10px;display:none}
    </style>
</head>
<body>
    <div class="box">
        <h1>🔐 ToolPrime Admin</h1>
        <p>Enter password</p>
        <div class="err" id="err">Wrong password!</div>
        <input type="password" id="pw" placeholder="Password" autofocus>
        <button onclick="login()">Login</button>
    </div>
    <script>
        function login(){
            if(document.getElementById('pw').value==='A3s4A5d7@$'){
                sessionStorage.setItem('tp_admin','true');
                window.location.href='dashboard.html';
            }else{document.getElementById('err').style.display='block'}
        }
        document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
    </script>
</body>
</html>
