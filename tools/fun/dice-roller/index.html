        <div class="result" style="margin-bottom:14px;min-height:120px;display:flex;align-items:center;justify-content:center">
    <div class="big" id="dice" style="font-size:5rem;transition:0.1s">🎲</div>
</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <label style="margin-bottom:0;min-width:40px">Dice:</label>
    <select id="dType" style="width:auto;flex:1;margin-bottom:0">
        <option value="4">d4 (4 sides)</option>
        <option value="6" selected>d6 (6 sides)</option>
        <option value="8">d8 (8 sides)</option>
        <option value="10">d10 (10 sides)</option>
        <option value="12">d12 (12 sides)</option>
        <option value="20">d20 (20 sides)</option>
        <option value="100">d100</option>
    </select>
</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
    <label style="margin-bottom:0;min-width:40px">Count:</label>
    <input type="number" id="dCount" value="1" min="1" max="20" style="width:80px;margin-bottom:0">
</div>
<button class="btn" onclick="roll()">🎯 Roll Dice!</button>
<div class="result" style="margin-top:12px;display:none" id="history">
    <div class="lbl">History</div>
    <div id="histList" style="font-size:0.85rem;color:var(--text);margin-top:4px"></div>
</div>
<script>
const emojis={4:'🔺',6:'🎲',8:'🔷',10:'🔟',12:'🔔',20:'💎',100:'💯'};
let hist=[];
function roll(){
    const sides=parseInt(document.getElementById('dType').value);
    const count=parseInt(document.getElementById('dCount').value)||1;
    const d=document.getElementById('dice');
    d.style.transform='rotate(360deg) scale(1.2)';
    setTimeout(()=>d.style.transform='rotate(0deg) scale(1)',100);
    let results=[],total=0;
    for(let i=0;i<count;i++){const r=Math.floor(Math.random()*sides)+1;results.push(r);total+=r}
    d.textContent=count>1?total:results[0];
    hist.unshift(`${count}d${sides}: [${results.join(', ')}] = ${total}`);
    if(hist.length>10)hist.pop();
    document.getElementById('histList').innerHTML=hist.map(h=>`<div>${h}</div>`).join('');
    document.getElementById('history').style.display='block';
}
</script>
