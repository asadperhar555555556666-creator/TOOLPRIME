<script>

<div class="tp-wrap">
    <a href="../../../index.html" class="tp-back">← Back to Store</a>
    <div class="tp-card">
        <h1>{ } JSON Formatter</h1>
        <p class="tp-desc">Format, validate, and beautify your JSON data online.</p>
        <textarea id="inp" rows="6" placeholder='Paste JSON here... e.g. {"name":"John","age":30}'></textarea>
<div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn" onclick="fmt()" style="flex:1">✨ Format / Beautify</button>
    <button class="btn-sm" onclick="min()">📦 Minify</button>
    <button class="btn-sm" onclick="val()">✅ Validate</button>
</div>
<textarea id="out" rows="8" placeholder="Formatted JSON will appear here..." readonly style="font-family:monospace;font-size:0.85rem"></textarea>
<script>
const inp=document.getElementById('inp'),out=document.getElementById('out');
function fmt(){try{const o=JSON.parse(inp.value);out.value=JSON.stringify(o,null,2);out.style.color='var(--text)';msg('Formatted!')}catch(e){out.value='❌ Invalid JSON: '+e.message;out.style.color='#f87171'}}
function min(){try{const o=JSON.parse(inp.value);out.value=JSON.stringify(o);out.style.color='var(--text)';msg('Minified!')}catch(e){out.value='❌ Invalid JSON';out.style.color='#f87171'}}
function val(){try{JSON.parse(inp.value);out.value='✅ Valid JSON!';out.style.color='#4ade80';msg('Valid!')}catch(e){out.value='❌ Invalid: '+e.message;out.style.color='#f87171'}}
</script>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
function msg(t){const x=document.getElementById('toast');x.textContent=t;x.className='toast ok show';clearTimeout(x._t);x._t=setTimeout(()=>x.classList.remove('show'),2000)}
</script>
