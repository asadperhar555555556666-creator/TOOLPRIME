<script>
(function(){
    const path = window.location.pathname;
    const depth = (path.match(/\//g)||[]).length - 1;

    // Fix logo image

    if(logoImg) logoImg.src = prefix + 'assets/images/toolprime.png';
    
    // Fix search
    const search = document.getElementById('tpSearch');
    if(search){
        search.addEventListener('keydown', function(e){
            if(e.key === 'Enter'){
                window.location.href = prefix + 'index.html?q=' + encodeURIComponent(this.value);
            }
        });
    }
    
    // Home button for tool pages
    if(depth > 0){
        const right = document.getElementById('tpRight');
        if(right){
            right.innerHTML = '<a href="../../../index.html">Home</a>';
        }
        const header = document.querySelector('header');
        if(header){ header.style.marginLeft = '-32px'; header.style.marginRight = '-32px'; }
    }
})();
</script>

<div class="tp-container">
    <a href="../../../index.html">← Back to Store</a>
    
    <div class="tp-card">
        <h1>⏱️ Stopwatch & Timer</h1>
        <p class="desc">Precise online stopwatch with lap recording & countdown timer with alarm sound.</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('stopwatch')" id="tabSW">⏱️ Stopwatch</button>
            <button class="tab" onclick="switchTab('timer')" id="tabTM">⏰ Timer</button>
        </div>
        
        <div class="display">
            <div class="time" id="display">00:00:00</div>
            <div class="milli" id="milli">.00</div>
        </div>
        
        <!-- Stopwatch -->
        <div id="swControls">
            <div class="btn-row">
                <button class="btn btn-start" id="swBtn" onclick="swToggle()">▶️ Start</button>
                <button class="btn btn-lap" id="lapBtn" onclick="swLap()" disabled>🏁 Lap</button>
            </div>
            <div style="text-align:center"><button class="btn btn-reset" onclick="swReset()">🔄 Reset</button></div>
        </div>
        
        <!-- Timer -->
        <div id="tmControls" style="display:none">
            <div class="timer-setup">
                <input type="number" id="tmMin" value="1" min="0" max="99">
                <label>min</label>
                <input type="number" id="tmSec" value="0" min="0" max="59">
                <label>sec</label>
            </div>
            <div class="btn-row">
                <button class="btn btn-start" id="tmBtn" onclick="tmToggle()">▶️ Start</button>
            </div>
            <div style="text-align:center"><button class="btn btn-reset" onclick="tmReset()">🔄 Reset</button></div>
        </div>
        
        <div class="laps" id="laps">
            <div style="font-weight:600;padding:8px;color:var(--accent);border-bottom:1px solid var(--border)">📋 Laps</div>
            <div id="lapsList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}

// ========== TABS ==========
let currentTab='stopwatch';
function switchTab(t){
    currentTab=t;
    document.getElementById('tabSW').classList.toggle('active',t==='stopwatch');
    document.getElementById('tabTM').classList.toggle('active',t==='timer');
    document.getElementById('swControls').style.display=t==='stopwatch'?'block':'none';
    document.getElementById('tmControls').style.display=t==='timer'?'block':'none';
    if(t==='stopwatch'){updateSWDisplay();document.getElementById('laps').classList.toggle('show',laps.length>0)}
    else{updateTMDisplay();document.getElementById('laps').classList.remove('show')}
}

// ========== STOPWATCH ==========
let swRunning=false,swTime=0,swInterval,laps=[];
function swToggle(){
    if(swRunning){swRunning=false;clearInterval(swInterval);document.getElementById('swBtn').textContent='▶️ Start';document.getElementById('swBtn').className='btn btn-start';document.getElementById('lapBtn').disabled=true}
    else{swRunning=true;swInterval=setInterval(()=>{swTime+=10;updateSWDisplay()},10);document.getElementById('swBtn').textContent='⏸️ Pause';document.getElementById('swBtn').className='btn btn-stop';document.getElementById('lapBtn').disabled=false}
}
function swLap(){laps.unshift(swTime);renderLaps();showToast('Lap recorded!')}
function swReset(){swRunning=false;clearInterval(swInterval);swTime=0;laps=[];updateSWDisplay();document.getElementById('swBtn').textContent='▶️ Start';document.getElementById('swBtn').className='btn btn-start';document.getElementById('lapBtn').disabled=true;document.getElementById('laps').classList.remove('show')}

function updateSWDisplay(){
    const ms=Math.floor(swTime%1000/10),s=Math.floor(swTime/1000%60),m=Math.floor(swTime/60000%60),h=Math.floor(swTime/3600000);
    document.getElementById('display').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('milli').textContent='.'+String(ms).padStart(2,'0');
    document.getElementById('display').classList.toggle('running',swRunning);
}

function renderLaps(){
    document.getElementById('laps').classList.add('show');
    const list=document.getElementById('lapsList');
    list.innerHTML=laps.map((t,i)=>{
        const ms=Math.floor(t%1000/10),s=Math.floor(t/1000%60),m=Math.floor(t/60000%60),h=Math.floor(t/3600000);
        return '<div class="lap-row"><span class="lap-num">#'+(laps.length-i)+'</span><span class="lap-time">'+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms).padStart(2,'0')+'</span></div>';
    }).join('');
}

// ========== TIMER ==========
let tmRunning=false,tmRemain=0,tmInterval;
function tmToggle(){
    if(tmRunning){tmRunning=false;clearInterval(tmInterval);document.getElementById('tmBtn').textContent='▶️ Resume';document.getElementById('tmBtn').className='btn btn-start';return}
    if(tmRemain<=0){const m=parseInt(document.getElementById('tmMin').value)||0;const s=parseInt(document.getElementById('tmSec').value)||0;tmRemain=m*60+s;if(tmRemain<=0){showToast('Set time!');return}}
    tmRunning=true;document.getElementById('tmBtn').textContent='⏸️ Pause';document.getElementById('tmBtn').className='btn btn-stop';
    tmInterval=setInterval(()=>{tmRemain--;updateTMDisplay();if(tmRemain<=0){tmStop();showToast('⏰ Time is up!');document.getElementById('display').classList.add('alarm');setTimeout(()=>document.getElementById('display').classList.remove('alarm'),3000)}},1000);
}
function tmStop(){tmRunning=false;clearInterval(tmInterval);document.getElementById('tmBtn').textContent='▶️ Start';document.getElementById('tmBtn').className='btn btn-start'}
function tmReset(){tmRunning=false;clearInterval(tmInterval);tmRemain=0;updateTMDisplay();document.getElementById('tmBtn').textContent='▶️ Start';document.getElementById('tmBtn').className='btn btn-start';document.getElementById('display').classList.remove('alarm')}

function updateTMDisplay(){
    const s=tmRemain%60,m=Math.floor(tmRemain/60%60),h=Math.floor(tmRemain/3600);
    document.getElementById('display').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('milli').textContent='';
}

// Init
updateSWDisplay();
</script>
