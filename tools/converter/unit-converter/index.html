<div class="uc-wrap">
    <a href="../../../index.html">← Back to Store</a>
    
    <div class="uc-card">
        <h1>📏 Unit Converter</h1>
        <p class="uc-desc">Convert between units instantly. Length, weight, temperature, area, speed, volume, time — all in one place!</p>
        
        <!-- Category Tabs -->
        <div class="cat-tabs" id="catTabs">
            <button class="cat-tab active" data-cat="length">📏 Length</button>
            <button class="cat-tab" data-cat="weight">⚖️ Weight</button>
            <button class="cat-tab" data-cat="temperature">🌡️ Temp</button>
            <button class="cat-tab" data-cat="area">📐 Area</button>

        </div>
        
        <!-- Converter -->
        <div class="conv-row">
            <input type="number" id="inputVal" value="1" oninput="convert()" placeholder="Enter value">
            <select id="fromUnit" onchange="convert()"></select>
            <button class="swap-btn" onclick="swap()" title="Swap">🔄</button>
            <select id="toUnit" onchange="convert()"></select>
        </div>
        
        <div class="result-box">

        </div>

<div class="toast" id="toast"></div>

<script>
function msg(t){const x=document.getElementById('toast');x.textContent=t;x.className='toast ok show';clearTimeout(x._t);x._t=setTimeout(()=>x.classList.remove('show'),2000)}

// Unit definitions (all relative to base unit)
const units={
    length:{
        base:'meter',
        list:[
            {name:'Kilometer',abbr:'km',val:1000},
            {name:'Meter',abbr:'m',val:1},
            {name:'Centimeter',abbr:'cm',val:0.01},
            {name:'Millimeter',abbr:'mm',val:0.001},
            {name:'Mile',abbr:'mi',val:1609.344},
            {name:'Yard',abbr:'yd',val:0.9144},
            {name:'Foot',abbr:'ft',val:0.3048},
            {name:'Inch',abbr:'in',val:0.0254},
            {name:'Nautical Mile',abbr:'nmi',val:1852}
        ]
    },
    weight:{
        base:'kilogram',
        list:[
            {name:'Kilogram',abbr:'kg',val:1},
            {name:'Gram',abbr:'g',val:0.001},
            {name:'Milligram',abbr:'mg',val:0.000001},
            {name:'Pound',abbr:'lb',val:0.453592},
            {name:'Ounce',abbr:'oz',val:0.0283495},
            {name:'Ton (Metric)',abbr:'t',val:1000},
            {name:'Stone',abbr:'st',val:6.35029}
        ]
    },
    temperature:{
        base:'celsius',
        list:[
            {name:'Celsius',abbr:'°C',val:'c'},
            {name:'Fahrenheit',abbr:'°F',val:'f'},
            {name:'Kelvin',abbr:'K',val:'k'}
        ]
    },
    area:{
        base:'sqmeter',
        list:[
            {name:'Square Meter',abbr:'m²',val:1},
            {name:'Square Kilometer',abbr:'km²',val:1000000},
            {name:'Square Mile',abbr:'mi²',val:2589988},
            {name:'Square Foot',abbr:'ft²',val:0.092903},
            {name:'Acre',abbr:'ac',val:4046.86},
            {name:'Hectare',abbr:'ha',val:10000}
        ]
    },
    speed:{
        base:'mps',
        list:[
            {name:'Meters/sec',abbr:'m/s',val:1},
            {name:'Kilometers/hr',abbr:'km/h',val:0.277778},
            {name:'Miles/hr',abbr:'mph',val:0.44704},
            {name:'Knot',abbr:'kn',val:0.514444},
            {name:'Mach',abbr:'M',val:343}
        ]
    },
    volume:{
        base:'liter',
        list:[
            {name:'Liter',abbr:'L',val:1},
            {name:'Milliliter',abbr:'mL',val:0.001},
            {name:'Cubic Meter',abbr:'m³',val:1000},
            {name:'Gallon (US)',abbr:'gal',val:3.78541},
            {name:'Quart',abbr:'qt',val:0.946353},
            {name:'Pint',abbr:'pt',val:0.473176},
            {name:'Cup',abbr:'cup',val:0.236588},
            {name:'Fluid Ounce',abbr:'fl oz',val:0.0295735}
        ]
    },
    time:{
        base:'second',
        list:[
            {name:'Second',abbr:'sec',val:1},
            {name:'Minute',abbr:'min',val:60},
            {name:'Hour',abbr:'hr',val:3600},
            {name:'Day',abbr:'day',val:86400},
            {name:'Week',abbr:'wk',val:604800},
            {name:'Month (30d)',abbr:'mo',val:2592000},
            {name:'Year (365d)',abbr:'yr',val:31536000}
        ]
    }
};

let currentCat='length';

// Category tabs
document.getElementById('catTabs').addEventListener('click',e=>{
    const tab=e.target.closest('.cat-tab');if(!tab)return;
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCat=tab.dataset.cat;
    populateUnits();
    convert();
});

function populateUnits(){
    const unitList=units[currentCat].list;
    const from=document.getElementById('fromUnit');
    const to=document.getElementById('toUnit');
    from.innerHTML=unitList.map((u,i)=>`<option value="${i}" ${i===0?'selected':''}>${u.abbr} - ${u.name}</option>`).join('');
    to.innerHTML=unitList.map((u,i)=>`<option value="${i}" ${i===Math.min(1,unitList.length-1)?'selected':''}>${u.abbr} - ${u.name}</option>`).join('');
    updateQuickCards();
}

function convertTemp(val,from,to){
    let c;
    if(from==='c') c=val;
    else if(from==='f') c=(val-32)*5/9;
    else c=val-273.15;
    
    if(to==='c') return c;
    if(to==='f') return (c*9/5)+32;
    return c+273.15;
}

function convert(){
    const val=parseFloat(document.getElementById('inputVal').value)||0;
    const unitList=units[currentCat].list;
    const fromIdx=parseInt(document.getElementById('fromUnit').value);
    const toIdx=parseInt(document.getElementById('toUnit').value);
    const from=unitList[fromIdx];
    const to=unitList[toIdx];
    
    let result;
    if(currentCat==='temperature'){
        result=convertTemp(val,from.val,to.val);
    }else{
        const baseVal=val*from.val;
        result=baseVal/to.val;
    }
    
    const formatted=result<0.000001?result.toExponential(6):result.toLocaleString('en-US',{maximumFractionDigits:10});
    document.getElementById('resultVal').textContent=formatted+' '+to.abbr;
    document.getElementById('resultEq').textContent=`${val} ${from.abbr} = ${formatted} ${to.abbr}`;
}

function swap(){
    const from=document.getElementById('fromUnit');
    const to=document.getElementById('toUnit');
    const temp=from.value;
    from.value=to.value;
    to.value=temp;
    convert();
}

function updateQuickCards(){
    const unitList=units[currentCat].list;
    const container=document.getElementById('quickCards');
    container.innerHTML=unitList.slice(0,6).map((u,i)=>
        `<div class="quick-card" onclick="quickConvert(${i})">
            <div class="qc-val">${u.abbr}</div>
            <div>${u.name}</div>
        </div>`
    ).join('');
}

function quickConvert(idx){
    document.getElementById('toUnit').value=idx;
    convert();
}

// Keyboard shortcut
document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();convert();}
});

// Init
populateUnits();
convert();
</script>
